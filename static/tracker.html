<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0E1424">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Trace — Tracking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F3ECD9; --ink: #0E1424; --ink-soft: #2A2F3E;
    --mustard: #D9A326; --vermilion: #E54B2A; --teal: #2C6B7E;
    --green: #2a8c4a;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: "Space Mono", monospace;
    background: var(--ink);
    color: var(--paper);
    min-height: 100dvh;
    display: flex; flex-direction: column;
    padding: 20px 20px 32px;
    gap: 16px;
  }
  h1 {
    font-family: "Bricolage Grotesque", sans-serif;
    font-size: 28px;
    letter-spacing: -0.02em;
  }
  h1 span { color: var(--teal); }
  .meta { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--ink-soft); color: #777; }
  .share-box {
    background: var(--ink-soft);
    border: 1px solid #333;
    border-radius: 6px;
    padding: 12px 14px;
    display: none; gap: 8px; flex-direction: column;
  }
  .share-box.visible { display: flex; }
  .share-url {
    font-size: 13px;
    word-break: break-all;
    color: var(--mustard);
    cursor: pointer;
  }
  .share-url:hover { text-decoration: underline; }
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    flex: 1;
  }
  .stat {
    background: rgba(255,255,255,.05);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 14px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat .label { font-size: 10px; text-transform: uppercase; letter-spacing: .14em; color: #777; }
  .stat .value { font-size: 28px; font-weight: 700; font-family: "Bricolage Grotesque", sans-serif; }
  .stat .unit { font-size: 11px; color: #777; }
  .controls { display: flex; gap: 10px; }
  .btn {
    flex: 1;
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: .02em;
    border: 2px solid;
    border-radius: 8px;
    padding: 16px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform .12s ease;
  }
  .btn:active { transform: scale(.97); }
  .btn-start { background: var(--green); border-color: var(--green); color: #fff; }
  .btn-stop  { background: var(--vermilion); border-color: var(--vermilion); color: #fff; }
  .btn-share { background: transparent; border-color: var(--teal); color: var(--teal); }
  .btn:disabled { opacity: .4; cursor: default; }
  .toggle {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: #999;
  }
  .toggle input { width: 18px; height: 18px; accent-color: var(--mustard); }
  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    margin-right: 6px;
  }
  .status-dot.active { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .queue-badge {
    font-size: 10px;
    color: var(--vermilion);
    display: none;
  }
  .queue-badge.visible { display: inline; }
  .account-box {
    background: rgba(255,255,255,.05);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .account-box h2 {
    font-family: "Bricolage Grotesque", sans-serif;
    font-size: 16px; font-weight: 700; margin: 0;
  }
  .account-box .row { display: flex; gap: 8px; }
  .account-box input {
    flex: 1;
    font-family: "Space Mono", monospace;
    font-size: 13px;
    background: var(--ink);
    color: var(--paper);
    border: 1px solid #555;
    border-radius: 4px;
    padding: 8px 10px;
  }
  .account-box input::placeholder { color: #666; }
  .btn-sm {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 700;
    font-size: 13px;
    border: 1px solid var(--teal);
    border-radius: 4px;
    padding: 8px 14px;
    background: transparent;
    color: var(--teal);
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-sm:hover { background: rgba(44,107,126,.15); }
  .account-info {
    font-size: 12px; color: #999;
    display: flex; flex-direction: column; gap: 6px;
  }
  .account-info .link {
    color: var(--mustard);
    word-break: break-all;
    cursor: pointer;
    font-size: 13px;
  }
  .account-info .link:hover { text-decoration: underline; }
  .account-info label { font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: #777; }
  .msg { font-size: 12px; color: var(--vermilion); }
  .msg.ok { color: var(--green); }
</style>
</head>
<body>

<div>
  <h1>trace<span>.</span></h1>
  <div class="meta">
    <span class="status-dot" id="dot"></span>
    <span id="status-text">Ready</span>
    <span class="queue-badge" id="queue-badge">• 0 queued</span>
  </div>
</div>

<div class="account-box" id="account-auth" style="display:flex">
  <h2>Account</h2>
  <div class="row">
    <input type="text" id="acc-slug" placeholder="slug (e.g. gaspard)">
    <input type="password" id="acc-pass" placeholder="password">
  </div>
  <div class="row">
    <button class="btn-sm" id="btn-login">Login</button>
    <button class="btn-sm" id="btn-register">Create</button>
  </div>
  <div class="msg" id="acc-msg"></div>
</div>

<div class="account-box" id="account-info" style="display:none">
  <h2>Account — <span id="acc-name"></span></h2>
  <div class="account-info">
    <div>
      <label>Permanent view link</label>
      <div class="link" id="acc-view-link"></div>
    </div>
    <div>
      <label>OwnTracks URL</label>
      <div class="link" id="acc-ot-link"></div>
    </div>
  </div>
  <div class="row">
    <input type="text" id="acc-new-slug" placeholder="new slug">
    <button class="btn-sm" id="btn-change-slug">Change slug</button>
    <button class="btn-sm" id="btn-logout">Logout</button>
  </div>
  <div class="msg" id="acc-info-msg"></div>
</div>

<div class="share-box" id="share-box">
  <div class="meta">Share this link so others can follow you live</div>
  <div class="share-url" id="share-url" title="Click to copy"></div>
  <div class="meta" style="margin-top:8px">OwnTracks URL (paste into app Settings &gt; Connection &gt; Host)</div>
  <div class="share-url" id="owntracks-url" title="Click to copy"></div>
</div>

<div class="stats">
  <div class="stat">
    <div class="label">Speed</div>
    <div><span class="value" id="speed">—</span> <span class="unit">km/h</span></div>
  </div>
  <div class="stat">
    <div class="label">Distance</div>
    <div><span class="value" id="distance">0.0</span> <span class="unit">km</span></div>
  </div>
  <div class="stat">
    <div class="label">Elevation</div>
    <div><span class="value" id="elevation">—</span> <span class="unit">m</span></div>
  </div>
  <div class="stat">
    <div class="label">Pings sent</div>
    <div><span class="value" id="pings">0</span></div>
  </div>
</div>

<div class="toggle">
  <input type="checkbox" id="low-power">
  <label for="low-power">Low-power mode (ping every 2 min instead of 15 s)</label>
</div>

<div class="controls">
  <button class="btn btn-start" id="btn-start">Start</button>
  <button class="btn btn-stop" id="btn-stop" disabled>Stop</button>
</div>

<script>
const $ = id => document.getElementById(id);
const BASE = location.origin;

let sessionId = null;
let watchId = null;
let pingTimer = null;
let lastPos = null;
let totalDist = 0;
let pingCount = 0;
let queue = [];
let prevLat = null, prevLon = null;
let wakeLock = null;
let audioCtx = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch {}
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && watchId !== null && !wakeLock) {
    acquireWakeLock();
  }
});

function startSilentAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  gain.gain.value = 0.001;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
}

function stopSilentAudio() {
  if (!audioCtx) return;
  audioCtx.close();
  audioCtx = null;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function interval() {
  return $('low-power').checked ? 120000 : 15000;
}

async function createSession() {
  const res = await fetch(`${BASE}/api/sessions`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name: null, hours: 48 }),
  });
  if (!res.ok) throw new Error('Failed to create session');
  return (await res.json()).id;
}

async function sendPing(ping) {
  try {
    const res = await fetch(`${BASE}/api/sessions/${sessionId}/ping`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(ping),
    });
    if (!res.ok) throw new Error(res.status);
    return true;
  } catch {
    return false;
  }
}

async function flushQueue() {
  while (queue.length > 0) {
    const ping = queue[0];
    if (await sendPing(ping)) {
      queue.shift();
      pingCount++;
      $('pings').textContent = pingCount;
    } else {
      break;
    }
  }
  updateQueueBadge();
}

function updateQueueBadge() {
  const badge = $('queue-badge');
  if (queue.length > 0) {
    badge.textContent = `• ${queue.length} queued`;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

function onPosition(pos) {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const ele = pos.coords.altitude;
  const speed = pos.coords.speed;
  const heading = pos.coords.heading;

  if (prevLat !== null) {
    totalDist += haversine(prevLat, prevLon, lat, lon);
  }
  prevLat = lat;
  prevLon = lon;

  $('speed').textContent = speed != null ? (speed * 3.6).toFixed(1) : '—';
  $('distance').textContent = totalDist.toFixed(1);
  $('elevation').textContent = ele != null ? Math.round(ele) : '—';

  lastPos = {
    ts: new Date().toISOString().replace('T', ' ').slice(0, 19),
    lat, lon,
    ele: ele != null ? Math.round(ele * 10) / 10 : null,
    speed: speed != null ? Math.round(speed * 36) / 10 : null,
    heading: heading != null ? Math.round(heading * 10) / 10 : null,
  };
}

function enqueuePing() {
  if (!lastPos) return;
  queue.push({...lastPos});
  flushQueue();
}

async function start() {
  try {
    sessionId = await createSession();
  } catch (e) {
    alert('Could not create session: ' + e.message);
    return;
  }

  totalDist = 0;
  pingCount = 0;
  prevLat = null;
  prevLon = null;
  lastPos = null;
  queue = [];
  $('speed').textContent = '—';
  $('distance').textContent = '0.0';
  $('elevation').textContent = '—';
  $('pings').textContent = '0';
  updateQueueBadge();

  const viewUrl = `${BASE}/view.html#${sessionId}`;
  const otUrl = `${BASE}/api/sessions/${sessionId}/owntracks`;
  $('share-url').textContent = viewUrl;
  $('owntracks-url').textContent = otUrl;
  $('share-box').classList.add('visible');

  function copyOnClick(el, url) {
    el.onclick = () => {
      navigator.clipboard.writeText(url).then(() => {
        el.textContent = 'Copied!';
        setTimeout(() => el.textContent = url, 1500);
      });
    };
  }
  copyOnClick($('share-url'), viewUrl);
  copyOnClick($('owntracks-url'), otUrl);

  $('btn-start').disabled = true;
  $('btn-stop').disabled = false;
  $('dot').classList.add('active');
  $('status-text').textContent = 'Tracking — ' + sessionId;

  watchId = navigator.geolocation.watchPosition(onPosition, err => {
    console.warn('Geo error:', err);
  }, { enableHighAccuracy: true, maximumAge: 5000 });

  pingTimer = setInterval(enqueuePing, interval());

  acquireWakeLock();
  startSilentAudio();
}

function stop() {
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);
  if (pingTimer) clearInterval(pingTimer);
  enqueuePing();

  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  stopSilentAudio();

  $('btn-start').disabled = false;
  $('btn-stop').disabled = true;
  $('dot').classList.remove('active');
  $('status-text').textContent = 'Stopped';
  watchId = null;
  pingTimer = null;
}

$('btn-start').onclick = start;
$('btn-stop').onclick = stop;
$('low-power').addEventListener('change', () => {
  if (pingTimer) {
    clearInterval(pingTimer);
    pingTimer = setInterval(enqueuePing, interval());
  }
});

let currentAccount = JSON.parse(localStorage.getItem('trace_account') || 'null');

function showAccountInfo(slug, password) {
  $('account-auth').style.display = 'none';
  $('account-info').style.display = 'flex';
  $('acc-name').textContent = slug;
  const viewUrl = `${BASE}/view.html#@${slug}`;
  const otUrl = `${BASE}/api/accounts/${slug}/owntracks`;
  $('acc-view-link').textContent = viewUrl;
  $('acc-ot-link').textContent = otUrl;

  function copyLink(el, url) {
    el.onclick = () => navigator.clipboard.writeText(url).then(() => {
      el.textContent = 'Copied!';
      setTimeout(() => el.textContent = url, 1500);
    });
  }
  copyLink($('acc-view-link'), viewUrl);
  copyLink($('acc-ot-link'), otUrl);
}

function authHeader() {
  if (!currentAccount) return {};
  return { 'Authorization': 'Basic ' + btoa(currentAccount.slug + ':' + currentAccount.password) };
}

async function login(slug, password) {
  const res = await fetch(`${BASE}/api/accounts/${slug}`, {
    headers: { 'Authorization': 'Basic ' + btoa(slug + ':' + password) },
  });
  if (res.status === 401) throw new Error('Wrong password');
  if (res.status === 404) throw new Error('Account not found');
  if (!res.ok) throw new Error('Error ' + res.status);
  currentAccount = { slug, password };
  localStorage.setItem('trace_account', JSON.stringify(currentAccount));
  showAccountInfo(slug, password);
}

async function register(slug, password) {
  const res = await fetch(`${BASE}/api/accounts`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slug, password }),
  });
  if (res.status === 409) throw new Error('Slug already taken');
  if (res.status === 400) throw new Error('Slug: 2-32 chars (a-z, 0-9, -, _). Password: 4+ chars.');
  if (!res.ok) throw new Error('Error ' + res.status);
  currentAccount = { slug, password };
  localStorage.setItem('trace_account', JSON.stringify(currentAccount));
  showAccountInfo(slug, password);
}

$('btn-login').onclick = async () => {
  const slug = $('acc-slug').value.trim().toLowerCase();
  const pass = $('acc-pass').value;
  $('acc-msg').className = 'msg';
  try {
    await login(slug, pass);
  } catch (e) { $('acc-msg').textContent = e.message; }
};

$('btn-register').onclick = async () => {
  const slug = $('acc-slug').value.trim().toLowerCase();
  const pass = $('acc-pass').value;
  $('acc-msg').className = 'msg';
  try {
    await register(slug, pass);
  } catch (e) { $('acc-msg').textContent = e.message; }
};

$('btn-logout').onclick = () => {
  currentAccount = null;
  localStorage.removeItem('trace_account');
  $('account-auth').style.display = 'flex';
  $('account-info').style.display = 'none';
  $('acc-slug').value = '';
  $('acc-pass').value = '';
};

$('btn-change-slug').onclick = async () => {
  const newSlug = $('acc-new-slug').value.trim().toLowerCase();
  if (!newSlug) return;
  $('acc-info-msg').className = 'msg';
  try {
    const res = await fetch(`${BASE}/api/accounts/${currentAccount.slug}`, {
      method: 'PUT',
      headers: { ...authHeader(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug: newSlug }),
    });
    if (res.status === 409) throw new Error('Slug already taken');
    if (res.status === 400) throw new Error('Invalid slug');
    if (!res.ok) throw new Error('Error ' + res.status);
    currentAccount.slug = newSlug;
    localStorage.setItem('trace_account', JSON.stringify(currentAccount));
    showAccountInfo(newSlug, currentAccount.password);
    $('acc-new-slug').value = '';
    $('acc-info-msg').className = 'msg ok';
    $('acc-info-msg').textContent = 'Slug updated!';
  } catch (e) { $('acc-info-msg').textContent = e.message; }
};

if (currentAccount) {
  showAccountInfo(currentAccount.slug, currentAccount.password);
}
</script>

</body>
</html>
